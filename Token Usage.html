<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Token Usage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  color-scheme: light;
  --bg: #f8f9fb;
  --panel: #ffffff;
  --panel-2: #fafbfc;
  --ink: #0f172a;
  --ink-2: #334155;
  --muted: #64748b;
  --muted-2: #94a3b8;
  --line: #e5e7eb;
  --line-2: #eef0f3;
  --accent: #4f46e5;
  --accent-soft: #eef2ff;
  --in: #818cf8;
  --out: #4f46e5;
  --warn: #d97706;
  --danger: #e11d48;
  --ok: #059669;
  --spike: #e11d48;
  --heavy: #b45309;
  --heat-base: #f1f5f9;
  --tip-bg: #0f172a;
  --hov: rgba(15, 23, 42, 0.04);
  --alert-spike-bg: #fff5f7;
  --alert-spike-border: #fecdd3;
  --alert-spike-icon-bg: #ffe4e6;
  --alert-heavy-bg: #fffbeb;
  --alert-heavy-border: #fde68a;
  --alert-heavy-icon-bg: #fef3c7;
  --alert-budget-bg: #eef2ff;
  --alert-budget-border: #c7d2fe;
  --alert-budget-icon-bg: #e0e7ff;
  --tag-spike-bg: #ffe4e6;
  --tag-heavy-bg: #fef3c7;
  --row-spike-bg: #fff5f7;
  --row-spike-hov: #ffecef;
  --delta-up-bg: #fef2f2;
  --delta-down-bg: #ecfdf5;
  --radius: 10px;
  --shadow: 0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 1px rgba(15, 23, 42, 0.03);
  --pad: 20px;
  --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
}

[data-theme="dark"] {
  color-scheme: dark;
  --bg: #0b0d12;
  --panel: #14171d;
  --panel-2: #191d24;
  --ink: #e6e8ec;
  --ink-2: #c4c9d2;
  --muted: #8a93a3;
  --muted-2: #5f6776;
  --line: #252a33;
  --line-2: #1d2129;
  --accent: #818cf8;
  --accent-soft: #1e2138;
  --in: #6366f1;
  --out: #a5b4fc;
  --warn: #f59e0b;
  --danger: #fb7185;
  --ok: #34d399;
  --spike: #fb7185;
  --heavy: #fbbf24;
  --heat-base: #1a1e26;
  --tip-bg: #e6e8ec;
  --hov: rgba(255, 255, 255, 0.04);
  --alert-spike-bg: #1f1417;
  --alert-spike-border: #4a1d26;
  --alert-spike-icon-bg: #2d151b;
  --alert-heavy-bg: #1f1a10;
  --alert-heavy-border: #4a3a1a;
  --alert-heavy-icon-bg: #2d2413;
  --alert-budget-bg: #1a1c2e;
  --alert-budget-border: #2e3459;
  --alert-budget-icon-bg: #1e2138;
  --tag-spike-bg: #2d151b;
  --tag-heavy-bg: #2d2413;
  --row-spike-bg: #1a1216;
  --row-spike-hov: #24161c;
  --delta-up-bg: #2a1518;
  --delta-down-bg: #102a1f;
  --shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 1px 1px rgba(0, 0, 0, 0.2);
}

[data-accent="teal"] { --accent: #0d9488; --accent-soft: #ecfeff; --in: #5eead4; --out: #0d9488; }
[data-accent="plum"] { --accent: #9333ea; --accent-soft: #f5f3ff; --in: #c4b5fd; --out: #9333ea; }
[data-accent="ink"]  { --accent: #1e293b; --accent-soft: #f1f5f9; --in: #94a3b8; --out: #1e293b; }

[data-theme="dark"][data-accent="teal"] { --accent: #2dd4bf; --accent-soft: #0a2a28; --in: #0d9488; --out: #5eead4; }
[data-theme="dark"][data-accent="plum"] { --accent: #c084fc; --accent-soft: #241a35; --in: #9333ea; --out: #c4b5fd; }
[data-theme="dark"][data-accent="ink"]  { --accent: #cbd5e1; --accent-soft: #1d2129; --in: #64748b; --out: #cbd5e1; }

[data-density="compact"] { --pad: 14px; }

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-ui);
  font-size: 13.5px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  transition: background 0.18s ease, color 0.18s ease;
}

/* ---- Theme toggle ---- */
.theme-btn {
  border: 1px solid var(--line); background: var(--panel);
  border-radius: 8px; padding: 6px 10px;
  font: inherit; font-size: 12.5px; color: var(--ink);
  cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
  height: 32px;
}
.theme-btn:hover { background: var(--panel-2); }
.theme-ico {
  width: 14px; height: 14px; display: inline-block;
  color: var(--muted);
}
.mono { font-family: var(--font-mono); font-feature-settings: 'tnum' 1, 'zero' 1; }
.muted { color: var(--muted); }
.muted-sm { color: var(--muted); font-size: 12px; }
.strong { font-weight: 600; }
.danger { color: var(--danger); }
.ok { color: var(--ok); }
.dot { width: 3px; height: 3px; border-radius: 50%; background: var(--muted-2); display: inline-block; margin: 0 6px; vertical-align: middle; }

/* ---- App shell ---- */
.app {
  max-width: 1320px;
  margin: 0 auto;
  padding: 20px 24px 80px;
}
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0 18px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 20px;
}
.topbar-l { display: flex; align-items: center; gap: 14px; }
.brand {
  display: flex; align-items: center; gap: 10px;
  font-weight: 600; font-size: 14px;
}
.brand-mark {
  width: 26px; height: 26px; border-radius: 7px;
  background: var(--ink); color: var(--bg);
  display: grid; place-items: center;
  font-family: var(--font-mono); font-size: 13px; font-weight: 600;
}
.crumb { color: var(--muted); font-size: 13px; }
.crumb-sep { color: var(--muted-2); margin: 0 8px; }

.topbar-r { display: flex; align-items: center; gap: 10px; }

/* ---- Filters bar ---- */
.filters {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 16px;
  align-items: center;
  flex-wrap: wrap;
}
.filters-l, .filters-r { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.seg {
  display: inline-flex;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 2px;
}
.seg-btn {
  border: 0; background: transparent;
  padding: 5px 12px; border-radius: 6px;
  font: inherit; color: var(--ink-2);
  cursor: pointer;
  font-size: 12.5px;
}
.seg-btn.on { background: var(--ink); color: var(--bg); }
.seg-btn:not(.on):hover { background: var(--line-2); }

select, input[type="text"], .search input {
  font: inherit;
  border: 1px solid var(--line);
  background: var(--panel);
  padding: 6px 10px;
  border-radius: 8px;
  color: var(--ink);
  font-size: 12.5px;
}
select:focus, input:focus, .search input:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: transparent; }
.search { position: relative; display: flex; align-items: center; gap: 6px; background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 0 8px 0 10px; }
.search > span { color: var(--muted-2); font-size: 14px; }
.search input { border: 0; background: transparent; padding: 6px 4px; width: 200px; }
.search input:focus { outline: none; }

.check {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12.5px; color: var(--ink-2);
  background: var(--panel); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px;
  cursor: pointer;
}
.check input { accent-color: var(--accent); }

/* Date range */
.daterange { position: relative; }
.daterange-btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--panel); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 12px;
  font: inherit; font-size: 12.5px; color: var(--ink);
  cursor: pointer;
}
.cal-ico { color: var(--muted); }
.caret-sm { color: var(--muted-2); font-size: 10px; }
.daterange-menu {
  position: absolute; top: 100%; right: 0; margin-top: 6px;
  background: var(--panel); border: 1px solid var(--line);
  border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  min-width: 180px; padding: 4px; z-index: 200;
}
.daterange-menu button {
  display: block; width: 100%; text-align: left;
  border: 0; background: transparent; padding: 7px 10px;
  border-radius: 6px; font: inherit; font-size: 13px;
  color: var(--ink-2); cursor: pointer;
}
.daterange-menu button:hover { background: var(--line-2); }
.daterange-menu button.on { background: var(--accent-soft); color: var(--accent); font-weight: 500; }

/* ---- Cards ---- */
.card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: var(--pad);
  box-shadow: var(--shadow);
}
.card-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 14px;
}
.card-title { font-weight: 600; font-size: 14px; letter-spacing: -0.005em; }
.card-sub { color: var(--muted); font-size: 12px; margin-top: 2px; }

/* ---- Hero ---- */
.hero { margin-bottom: 16px; }
.hero-grid {
  display: grid;
  grid-template-columns: 1.5fr 1fr;
  gap: 32px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--line-2);
  margin-bottom: 16px;
}
.hero-label {
  text-transform: uppercase; letter-spacing: 0.08em;
  font-size: 10.5px; color: var(--muted); font-weight: 500;
}
.hero-nums { display: flex; align-items: baseline; gap: 28px; margin-top: 8px; flex-wrap: wrap; }
.hero-big {
  display: flex; align-items: baseline; gap: 10px;
}
.hero-big .mono { font-size: 44px; font-weight: 600; letter-spacing: -0.02em; line-height: 1; color: var(--ink); }
.hero-big-sec .mono { font-size: 30px; color: var(--ink-2); font-weight: 500; }
.hero-unit { color: var(--muted); font-size: 13px; }
.hero-meta {
  margin-top: 14px; display: flex; align-items: center;
  color: var(--ink-2); font-size: 12.5px; flex-wrap: wrap; gap: 0;
}
.delta {
  font-family: var(--font-mono);
  padding: 2px 7px; border-radius: 999px;
  font-size: 11.5px; font-weight: 500;
  margin-right: 8px;
}
.delta.up { background: var(--delta-up-bg); color: var(--danger); }
.delta.down { background: var(--delta-down-bg); color: var(--ok); }

/* budget */
.hero-budget { padding-left: 24px; border-left: 1px solid var(--line-2); }
.budget-head { display: flex; justify-content: space-between; align-items: baseline; }
.budget-val { font-size: 13px; font-weight: 600; }
.budget-bar {
  margin-top: 10px;
  height: 8px; background: var(--line-2);
  border-radius: 999px; overflow: hidden; position: relative;
}
.budget-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
.budget-fill.warn { background: var(--warn); }
.budget-fill.over { background: var(--danger); }
.budget-foot { display: flex; justify-content: space-between; margin-top: 8px; }

/* ---- Trend chart ---- */
.trend-wrap { position: relative; }
.trend-svg { width: 100%; height: auto; display: block; }
.grid { stroke: var(--line-2); stroke-width: 1; }
.axis { fill: var(--muted-2); font-size: 10.5px; font-family: var(--font-ui); }
.axis.mono { font-family: var(--font-mono); }
.bar-in { fill: var(--in); }
.bar-out { fill: var(--out); }
.bar-hov { fill: var(--ink); opacity: 0.05; }
.tip-bg { fill: var(--tip-bg); opacity: 0.96; }
.tip-title { fill: var(--bg); font-size: 11px; font-weight: 600; font-family: var(--font-ui); }
.tip-row { fill: var(--bg); opacity: 0.82; font-size: 11px; font-family: var(--font-mono); }
.legend {
  position: absolute; top: 0; right: 0;
  display: flex; gap: 14px;
  color: var(--muted); font-size: 11.5px;
}
.legend span { display: inline-flex; align-items: center; gap: 5px; }
.sw { width: 9px; height: 9px; border-radius: 2px; display: inline-block; }
.sw-out { background: var(--out); }
.sw-in { background: var(--in); }

/* ---- Grid row: surface + model ---- */
.grid-2 { display: grid; grid-template-columns: 1.3fr 1fr; gap: 16px; margin: 16px 0; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin: 16px 0; }

.split-list { display: flex; flex-direction: column; gap: 14px; }
.split-row {}
.split-head { display: flex; justify-content: space-between; align-items: center; }
.split-name { font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
.split-val { font-size: 14px; font-weight: 600; }
.split-bar { height: 6px; background: var(--line-2); border-radius: 999px; margin: 8px 0 6px; overflow: hidden; }
.split-bar > div { height: 100%; border-radius: 999px; }
.split-meta { display: flex; justify-content: space-between; }

/* ---- Donut ---- */
.donut-row { display: grid; grid-template-columns: 140px 1fr; gap: 20px; align-items: center; }
.donut { width: 140px; height: 140px; }
.donut-big { font-size: 18px; font-weight: 600; fill: var(--ink); }
.donut-sm { font-size: 9px; fill: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
.donut-legend { display: flex; flex-direction: column; gap: 10px; }
.donut-item-head { display: flex; justify-content: space-between; font-size: 13px; font-weight: 500; }
.donut-item-head .mono { font-size: 12.5px; }
.donut-item-sub { margin-top: 2px; }

/* ---- Heatmap ---- */
.heat-wrap {}
.heat-grid {
  display: grid;
  grid-template-columns: 36px repeat(24, 1fr);
  gap: 2px;
  align-items: center;
}
.heat-day { font-size: 11px; color: var(--muted); text-align: right; padding-right: 6px; }
.heat-hour { font-size: 10px; color: var(--muted-2); text-align: center; font-family: var(--font-mono); }
.heat-cell {
  aspect-ratio: 1;
  border-radius: 3px;
  background: color-mix(in oklab, var(--accent) calc(var(--t) * 80%), var(--heat-base));
  transition: transform 0.1s;
  cursor: pointer;
}
.heat-cell:hover { transform: scale(1.3); z-index: 2; position: relative; outline: 2px solid var(--ink); outline-offset: 1px; }
.heat-spike {
  background: color-mix(in oklab, var(--spike) calc(var(--t) * 85%), var(--heat-base));
  outline: 1px solid var(--spike);
  outline-offset: -1px;
}
.heat-foot {
  display: flex; align-items: center; gap: 10px;
  margin-top: 16px;
  color: var(--muted);
}
.heat-scale { display: flex; gap: 2px; }
.heat-scale > div {
  width: 14px; height: 14px; border-radius: 3px;
  background: color-mix(in oklab, var(--accent) calc(var(--t) * 80%), var(--heat-base));
}
.spike-dot { width: 8px; height: 8px; border-radius: 2px; background: var(--spike); display: inline-block; margin-right: 4px; vertical-align: middle; }

/* ---- Alerts ---- */
.alerts { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 10px; margin: 16px 0; }
.alert {
  display: flex; gap: 12px; align-items: flex-start;
  padding: 12px 14px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: var(--panel);
}
.alert-icon {
  width: 30px; height: 30px; border-radius: 7px;
  display: grid; place-items: center;
  font-size: 14px;
  flex-shrink: 0;
}
.alert-title { font-weight: 600; font-size: 13px; }
.alert-text { color: var(--muted); font-size: 12.5px; margin-top: 2px; }
.alert-spike { border-color: var(--alert-spike-border); background: linear-gradient(0deg, var(--alert-spike-bg), var(--panel)); }
.alert-spike .alert-icon { background: var(--alert-spike-icon-bg); color: var(--spike); }
.alert-heavy { border-color: var(--alert-heavy-border); background: linear-gradient(0deg, var(--alert-heavy-bg), var(--panel)); }
.alert-heavy .alert-icon { background: var(--alert-heavy-icon-bg); color: var(--heavy); }
.alert-budget { border-color: var(--alert-budget-border); background: linear-gradient(0deg, var(--alert-budget-bg), var(--panel)); }
.alert-budget .alert-icon { background: var(--alert-budget-icon-bg); color: var(--accent); }

/* ---- Table ---- */
.tbl-wrap {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl thead th {
  text-align: left;
  padding: 11px 14px;
  color: var(--muted);
  font-weight: 500;
  font-size: 11.5px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  background: var(--panel-2);
  border-bottom: 1px solid var(--line);
}
.tbl th.num, .tbl td.num { text-align: right; }
.tbl tbody tr { border-bottom: 1px solid var(--line-2); cursor: pointer; transition: background 0.1s; }
.tbl tbody tr:hover { background: var(--panel-2); }
.tbl tbody tr:last-child { border-bottom: 0; }
.tbl tbody tr.row-spike { background: var(--row-spike-bg); }
.tbl tbody tr.row-spike:hover { background: var(--row-spike-hov); }
.tbl td { padding: 12px 14px; vertical-align: middle; }
.row-title { font-weight: 500; display: flex; align-items: center; gap: 8px; }
.row-sub { margin-top: 2px; }
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px;
  padding: 3px 8px;
  border-radius: 999px;
  background: var(--accent-soft);
  color: var(--accent);
  font-weight: 500;
}
.chip-ghost { background: var(--line-2); color: var(--ink-2); }
.tag {
  display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 4px;
  font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
}
.tag-spike { background: var(--tag-spike-bg); color: var(--spike); }
.tag-heavy { background: var(--tag-heavy-bg); color: var(--heavy); }
.caret { color: var(--muted-2); text-align: right; font-size: 16px; }
.empty { padding: 32px; text-align: center; color: var(--muted); }

/* ---- Drawer ---- */
.drawer-backdrop {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.42);
  z-index: 50;
  animation: fade 0.15s ease;
}
.drawer {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: min(540px, 94vw);
  background: var(--panel);
  border-left: 1px solid var(--line);
  z-index: 51;
  overflow-y: auto;
  animation: slide 0.22s ease;
  padding: 24px 26px 80px;
}
@keyframes fade { from { opacity: 0; } to { opacity: 1; } }
@keyframes slide { from { transform: translateX(20px); opacity: 0; } to { transform: none; opacity: 1; } }
.drawer-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 12px; margin-bottom: 20px;
}
.drawer-title { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; margin: 4px 0 10px; }
.drawer-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.x {
  width: 30px; height: 30px; border: 1px solid var(--line); background: var(--panel);
  border-radius: 8px; font-size: 18px; cursor: pointer; color: var(--muted);
  line-height: 1;
}
.x:hover { background: var(--line-2); color: var(--ink); }

.drawer-stats {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
  margin-bottom: 24px;
  padding: 14px;
  background: var(--panel-2);
  border: 1px solid var(--line-2);
  border-radius: 8px;
}
.stat-label { font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; }
.stat-val { font-size: 17px; font-weight: 600; margin-top: 3px; letter-spacing: -0.005em; }
.stat-sub { font-size: 11.5px; color: var(--muted); margin-top: 2px; font-family: var(--font-mono); }

.drawer-sec { margin-bottom: 24px; }
.drawer-sec-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
.drawer-sec-head h3 { font-size: 13px; font-weight: 600; margin: 0; }

.turns { display: flex; flex-direction: column; gap: 4px; }
.turn-row { display: grid; grid-template-columns: 28px 1fr 60px; align-items: center; gap: 10px; font-size: 12px; }
.turn-i { text-align: right; }
.turn-bar { height: 14px; display: flex; border-radius: 3px; overflow: hidden; background: var(--line-2); }
.turn-in { background: var(--in); }
.turn-out { background: var(--out); }
.turn-val { text-align: right; font-size: 12px; }

.timing { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.timing > div { padding: 10px 12px; background: var(--panel-2); border: 1px solid var(--line-2); border-radius: 6px; }
.timing .mono { margin-top: 3px; font-size: 12.5px; font-weight: 500; }

/* ---- Tweaks ---- */
.tweak-toggle {
  border: 1px solid var(--line); background: var(--panel);
  padding: 6px 12px; border-radius: 8px; font: inherit; font-size: 12.5px;
  color: var(--ink) !important;
  cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
  height: 32px;
}
.tweak-toggle:hover { background: var(--panel-2); }
.tweak-toggle.on { background: var(--ink) !important; color: var(--bg) !important; border-color: var(--ink); }
.tweaks {
  position: fixed; right: 20px; bottom: 20px;
  width: 300px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 12px;
  box-shadow: 0 14px 40px rgba(0,0,0,0.28);
  padding: 18px 20px;
  z-index: 40;
}
.tweaks-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 16px;
}
.tweaks-head h3 { margin: 0; font-size: 14px; font-weight: 600; }
.tweaks-sec { margin-bottom: 16px; }
.tweaks-sec:last-child { margin-bottom: 0; }
.tweaks-sec > label {
  display: flex; justify-content: space-between;
  font-size: 11px; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.06em;
  font-weight: 500; margin-bottom: 8px;
}
.tweaks-sec input[type="range"] { width: 100%; accent-color: var(--accent); }
.swatches { display: flex; gap: 8px; }
.swatch {
  width: 28px; height: 28px; border-radius: 8px;
  border: 2px solid transparent;
  cursor: pointer;
}
.swatch.on { border-color: var(--ink); box-shadow: 0 0 0 2px var(--panel) inset; }

/* ---- Model tabs ---- */
.model-tabs {
  margin-bottom: 8px;
}
.model-tab-dot {
  width: 8px; height: 8px; border-radius: 50%;
  display: inline-block; flex-shrink: 0;
}

/* ---- Compact density ---- */
[data-density="compact"] .hero-big .mono { font-size: 36px; }
[data-density="compact"] .tbl td { padding: 8px 12px; }
[data-density="compact"] .tbl thead th { padding: 8px 12px; }
[data-density="compact"] .drawer-stats { grid-template-columns: repeat(4, 1fr); padding: 10px; }

@media (max-width: 900px) {
  .hero-grid { grid-template-columns: 1fr; }
  .hero-budget { padding-left: 0; border-left: 0; border-top: 1px solid var(--line-2); padding-top: 16px; }
  .grid-2 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="live_usage.js"></script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useMemo, useEffect, useRef } = React;

// ---------- Formatting ----------
const fmtTok = (n) => {
  if (n == null) return '—';
  if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'k';
  return String(Math.round(n));
};
const fmtTokFull = (n) => n == null ? '—' : Math.round(n).toLocaleString('en-US');
const fmt$ = (n) => '$' + (n || 0).toFixed(2);
const fmtTime = (iso) => new Date(iso).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
const fmtDay = (iso) => new Date(iso).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
const fmtDuration = (min) => min < 60 ? `${min}m` : `${Math.floor(min/60)}h ${min%60}m`;

// ---------- Primitives ----------
function Card({ title, subtitle, right, children, className = '' }) {
  return (
    <div className={`card ${className}`}>
      {(title || right) && (
        <div className="card-head">
          <div>
            {title && <div className="card-title">{title}</div>}
            {subtitle && <div className="card-sub">{subtitle}</div>}
          </div>
          {right}
        </div>
      )}
      {children}
    </div>
  );
}

function Stat({ label, value, sub, tone }) {
  return (
    <div className="stat">
      <div className="stat-label">{label}</div>
      <div className={`stat-val ${tone || ''}`}>{value}</div>
      {sub && <div className="stat-sub">{sub}</div>}
    </div>
  );
}

// ---------- Hero ----------
const RANGE_HERO_LABELS = {
  week:    'Total this week',
  month:   'Total this month',
  last30:  'Last 30 days',
  quarter: 'Total this quarter',
  year:    'Total this year',
  alltime: 'All time total',
};

function Hero({ data, displayMode, budget, dateRange }) {
  const total = data.daily.reduce((a, b) => a + b.totalTokens, 0);
  const totalIn = data.daily.reduce((a, b) => a + b.inputTokens, 0);
  const totalOut = data.daily.reduce((a, b) => a + b.outputTokens, 0);
  const cost = data.daily.reduce((a, b) => a + b.cost, 0);
  const prev = data.prevWeekTotal;
  const delta = ((total - prev) / prev) * 100;

  const showTok = displayMode !== 'cost';
  const showCost = displayMode !== 'tokens';

  // Budget bar against monthly plan
  const pctBudget = Math.min(100, (cost / budget) * 100);
  const budgetOver = cost > budget;

  // Plan value: API-equivalent cost vs pro-plan cost for this period
  const { start: rangeStart, end: rangeEnd } = getRangeBounds(dateRange);
  const effectiveEnd = rangeEnd === Infinity ? Date.now() : Math.min(rangeEnd, Date.now());
  const daysInRange = Math.max(1, (effectiveEnd - rangeStart) / 86400000);
  const planCostForPeriod = (budget / 30) * daysInRange;
  const planValue = planCostForPeriod > 0 ? cost / planCostForPeriod : 0;
  const planValueStr = planValue.toFixed(1) + 'x';
  const planValueTone = planValue >= 1.0 ? 'ok' : 'danger';

  return (
    <Card className="hero">
      <div className="hero-grid">
        <div className="hero-main">
          <div className="hero-label">{RANGE_HERO_LABELS[dateRange] || 'Total this week'}</div>
          <div className="hero-nums">
            {showTok && (
              <div className="hero-big">
                <span className="mono">{fmtTok(total)}</span>
                <span className="hero-unit">tokens</span>
              </div>
            )}
            {showCost && (
              <div className={`hero-big ${showTok ? 'hero-big-sec' : ''}`}>
                <span className="mono">{fmt$(cost)}</span>
                <span className="hero-unit" style={{ display: 'flex', flexDirection: 'column', gap: 1 }}>
                  <span>spend</span>
                  <span className="muted-sm" style={{ fontWeight: 400, fontSize: 10 }}>est. API value</span>
                </span>
              </div>
            )}
            <div className="hero-big hero-big-sec" title="How much API value you get per $1 of your Pro subscription" style={{ cursor: 'default' }}>
              <span className={`mono ${planValueTone}`}>{planValueStr}</span>
              <span className="hero-unit">plan value</span>
            </div>
          </div>
          <div className="hero-meta">
            <span className={`delta ${delta >= 0 ? 'up' : 'down'}`}>
              {delta >= 0 ? '▲' : '▼'} {Math.abs(delta).toFixed(1)}%
            </span>
            <span className="muted">vs. prev period</span>
            <span className="dot" />
            <span className="muted">
              <span className="mono">{fmtTok(totalIn)}</span> in · <span className="mono">{fmtTok(totalOut)}</span> out
            </span>
            <span className="dot" />
            <span className="muted">{data.sessions.length} chats</span>
          </div>
        </div>

        <div className="hero-budget">
          <div className="budget-head">
            <span className="muted-sm">Monthly plan</span>
            <span className="mono budget-val">{fmt$(cost)} / {fmt$(budget)}</span>
          </div>
          <div className="budget-bar">
            <div
              className={`budget-fill ${budgetOver ? 'over' : pctBudget > 80 ? 'warn' : ''}`}
              style={{ width: pctBudget + '%' }}
            />
          </div>
          <div className="budget-foot">
            <span className={`muted-sm ${budgetOver ? 'danger' : ''}`}>
              {budgetOver ? `Over by ${fmt$(cost - budget)}` : `${fmt$(budget - cost)} remaining`}
            </span>
            <span className="muted-sm">{pctBudget.toFixed(0)}%</span>
          </div>
          <div className="muted-sm" style={{ marginTop: 6, fontSize: 10, lineHeight: 1.4 }}>
            ⚡ API-equivalent cost — your actual plan is {fmt$(budget)}/month flat
          </div>
        </div>
      </div>

      <TrendChart data={data.daily} displayMode={displayMode} />
    </Card>
  );
}

// ---------- Trend chart ----------
function TrendChart({ data, displayMode }) {
  const W = 920, H = 180, PAD = { l: 48, r: 16, t: 16, b: 28 };
  const innerW = W - PAD.l - PAD.r;
  const innerH = H - PAD.t - PAD.b;

  // Derive labels from d.date ISO string — never from a raw index or dayIndex
  const enriched = data.map(d => {
    const dt = new Date(d.date);
    return {
      ...d,
      label:     d.label     || dt.toLocaleDateString('en-US', { weekday: 'short' }),
      dateLabel: dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
    };
  });

  const useCost = displayMode === 'cost';
  // Use 95th-percentile as scale ceiling so one spike doesn't flatten all other bars.
  // Any bar that exceeds the ceiling renders at full height with a ▲ spike indicator.
  const vals = enriched.map(d => useCost ? d.cost : d.totalTokens);
  const sorted = [...vals].sort((a, b) => a - b);
  const p95 = sorted[Math.floor(sorted.length * 0.95)] || sorted[sorted.length - 1] || 1;
  const ceiling = Math.max(p95 * 1.15, 1e-9);
  const bw = innerW / enriched.length;
  const [hover, setHover] = useState(null);

  return (
    <div className="trend-wrap">
      <svg viewBox={`0 0 ${W} ${H}`} className="trend-svg">
        {[0, 0.25, 0.5, 0.75, 1].map((t, i) => {
          const y = PAD.t + innerH * (1 - t);
          const v = ceiling * t;
          return (
            <g key={i}>
              <line x1={PAD.l} x2={W - PAD.r} y1={y} y2={y} className="grid" />
              <text x={PAD.l - 8} y={y + 4} className="axis mono" textAnchor="end">
                {useCost ? '$' + v.toFixed(0) : fmtTok(v)}
              </text>
            </g>
          );
        })}
        {enriched.map((d, i) => {
          const x = PAD.l + bw * i + bw * 0.18;
          const w = bw * 0.64;
          const value   = useCost ? d.cost : d.totalTokens;
          const capped  = value > ceiling;
          const display = Math.min(value, ceiling);
          const h   = (display / ceiling) * innerH;
          const y   = PAD.t + innerH - h;
          const inH = useCost ? h * 0.5 : (value > 0 ? (d.inputTokens / value) * h : 0);
          const outH = h - inH;
          return (
            <g key={i} onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)}>
              <rect x={x} y={y + outH} width={w} height={inH} className="bar-in" rx="2" />
              <rect x={x} y={y} width={w} height={outH} className="bar-out" rx="2" />
              {capped && (
                <text x={x + w / 2} y={y - 2} className="axis" textAnchor="middle" fontSize="9" fill="var(--accent)">▲</text>
              )}
              {hover === i && (
                <rect x={PAD.l + bw * i} y={PAD.t} width={bw} height={innerH} className="bar-hov" />
              )}
              <text x={x + w / 2} y={H - 10} className="axis" textAnchor="middle">{d.label}</text>
            </g>
          );
        })}
        {hover != null && (() => {
          const d = enriched[hover];
          const x = PAD.l + bw * hover + bw / 2;
          const tx = Math.min(W - 140, Math.max(8, x - 70));
          return (
            <g>
              <rect x={tx} y={PAD.t + 4} width="140" height="58" className="tip-bg" rx="4" />
              <text x={tx + 8} y={PAD.t + 20} className="tip-title">{d.dateLabel}</text>
              <text x={tx + 8} y={PAD.t + 36} className="tip-row mono">{fmtTok(d.totalTokens)} tok</text>
              <text x={tx + 8} y={PAD.t + 52} className="tip-row mono">{fmt$(d.cost)} · {d.sessions} chats</text>
            </g>
          );
        })()}
      </svg>
      <div className="legend">
        <span><i className="sw sw-out" /> Output</span>
        <span><i className="sw sw-in" /> Input</span>
      </div>
    </div>
  );
}

// ---------- Surface split ----------
function SurfaceSplit({ data, displayMode }) {
  const useCost = displayMode === 'cost';
  const surfaces = data.SURFACES.map(s => {
    const ss = data.sessions.filter(x => x.surface === s.id);
    return {
      ...s,
      total: ss.reduce((a, b) => a + b.totalTokens, 0),
      cost: ss.reduce((a, b) => a + b.cost, 0),
      count: ss.length,
    };
  });
  const sum = surfaces.reduce((a, b) => a + (useCost ? b.cost : b.total), 0);

  return (
    <Card title="By surface" subtitle="Where tokens are being spent">
      <div className="split-list">
        {surfaces.map(s => {
          const v = useCost ? s.cost : s.total;
          const pct = (v / sum) * 100;
          return (
            <div key={s.id} className="split-row">
              <div className="split-head">
                <div className="split-name"><i className="sw" style={{ background: s.color }} /> {s.label}</div>
                <div className="split-val mono">{useCost ? fmt$(s.cost) : fmtTok(s.total)}</div>
              </div>
              <div className="split-bar"><div style={{ width: pct + '%', background: s.color }} /></div>
              <div className="split-meta">
                <span className="muted-sm mono">{pct.toFixed(1)}%</span>
                <span className="muted-sm">{s.count} chats · {useCost ? fmtTok(s.total) + ' tok' : fmt$(s.cost)}</span>
              </div>
            </div>
          );
        })}
      </div>
    </Card>
  );
}

// ---------- Model mix donut ----------
function ModelMix({ data, displayMode }) {
  const useCost = displayMode === 'cost';
  const models = data.MODELS.map(m => {
    const ss = data.sessions.filter(x => x.model === m.id);
    return {
      ...m,
      total: ss.reduce((a, b) => a + b.totalTokens, 0),
      cost: ss.reduce((a, b) => a + b.cost, 0),
      count: ss.length,
    };
  });
  const sum = models.reduce((a, b) => a + (useCost ? b.cost : b.total), 0);
  const R = 52, r = 34, CX = 70, CY = 70;
  let acc = 0;
  const segs = models.map(m => {
    const v = useCost ? m.cost : m.total;
    const frac = v / sum;
    const a0 = acc * Math.PI * 2 - Math.PI / 2;
    acc += frac;
    const a1 = acc * Math.PI * 2 - Math.PI / 2;
    const large = frac > 0.5 ? 1 : 0;
    const x0 = CX + R * Math.cos(a0), y0 = CY + R * Math.sin(a0);
    const x1 = CX + R * Math.cos(a1), y1 = CY + R * Math.sin(a1);
    const x0i = CX + r * Math.cos(a0), y0i = CY + r * Math.sin(a0);
    const x1i = CX + r * Math.cos(a1), y1i = CY + r * Math.sin(a1);
    return {
      ...m, frac,
      d: `M ${x0} ${y0} A ${R} ${R} 0 ${large} 1 ${x1} ${y1} L ${x1i} ${y1i} A ${r} ${r} 0 ${large} 0 ${x0i} ${y0i} Z`,
    };
  });

  return (
    <Card title="Model mix" subtitle="Token share by model">
      <div className="donut-row">
        <svg viewBox="0 0 140 140" className="donut">
          {segs.map(s => <path key={s.id} d={s.d} fill={s.color} />)}
          <text x="70" y="68" className="donut-big mono" textAnchor="middle">{data.sessions.length}</text>
          <text x="70" y="84" className="donut-sm" textAnchor="middle">chats</text>
        </svg>
        <div className="donut-legend">
          {segs.map(s => (
            <div key={s.id} className="donut-item">
              <div className="donut-item-head">
                <span><i className="sw" style={{ background: s.color }} /> {s.label}</span>
                <span className="mono">{(s.frac * 100).toFixed(0)}%</span>
              </div>
              <div className="donut-item-sub muted-sm mono">
                {useCost ? fmt$(s.cost) : fmtTok(s.total)} · {s.count} chats
              </div>
            </div>
          ))}
        </div>
      </div>
    </Card>
  );
}

// ---------- Heatmap ----------
function Heatmap({ data }) {
  const grid = data.heatmap;
  // Values are already normalised 0–1 with mean+2σ ceiling by filteredData
  const max = 1;
  const hours = [0, 3, 6, 9, 12, 15, 18, 21];
  // days array is Mon→today (variable length). Derive all 7 weekday labels from days[0] (Monday).
  const dayLabels = (() => {
    const fallback = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
    if (!data.days || !data.days.length) return fallback;
    const mon = new Date(data.days[0]);
    return Array.from({ length: 7 }, (_, i) =>
      new Date(mon.getTime() + i * 86400000).toLocaleDateString('en-US', { weekday: 'short' })
    );
  })();
  const [hover, setHover] = useState(null);

  return (
    <Card title="Activity by hour" subtitle="Heavier cells = more tokens; 24 × 7">
      <div className="heat-wrap">
        <div className="heat-grid">
          <div />
          {Array.from({ length: 24 }).map((_, h) => (
            <div key={h} className="heat-hour">{hours.includes(h) ? (h === 0 ? '12a' : h < 12 ? h + 'a' : h === 12 ? '12p' : (h-12)+'p') : ''}</div>
          ))}
          {grid.map((row, di) => (
            <React.Fragment key={di}>
              <div className="heat-day">{dayLabels[di]}</div>
              {row.map((v, hi) => {
                const t = v / max;
                const isSpike = t > 0.9;  // top 10% intensity = detected spike
                return (
                  <div
                    key={hi}
                    className={`heat-cell ${isSpike ? 'heat-spike' : ''}`}
                    style={{ '--t': t.toFixed(3) }}
                    onMouseEnter={() => setHover({ di, hi, v })}
                    onMouseLeave={() => setHover(null)}
                    title={`${dayLabels[di]} ${hi}:00 · ${(t * 100).toFixed(0)}% intensity`}
                  />
                );
              })}
            </React.Fragment>
          ))}
        </div>
        <div className="heat-foot">
          <span className="muted-sm">Less</span>
          <div className="heat-scale">
            {[0.1, 0.3, 0.5, 0.7, 0.9].map(t => <div key={t} style={{ '--t': t }} />)}
          </div>
          <span className="muted-sm">More</span>
          <span className="dot" />
          <span className="muted-sm"><i className="spike-dot" /> Detected spike</span>
        </div>
      </div>
    </Card>
  );
}

// ---------- Sessions table ----------
function SessionsTable({ data, filters, onPick, displayMode }) {
  const rows = useMemo(() => {
    let r = data.sessions.slice();
    if (filters.surface !== 'all') r = r.filter(s => s.surface === filters.surface);
    if (filters.model !== 'all') r = r.filter(s => s.model === filters.model);
    if (filters.q) {
      const q = filters.q.toLowerCase();
      r = r.filter(s => s.title.toLowerCase().includes(q));
    }
    if (filters.onlyHeavy) r = r.filter(s => s.heavy);
    const by = filters.sort;
    r.sort((a, b) => {
      if (by === 'recent') return new Date(b.start) - new Date(a.start);
      if (by === 'tokens') return b.totalTokens - a.totalTokens;
      if (by === 'cost') return b.cost - a.cost;
      if (by === 'duration') return b.durationMin - a.durationMin;
      return 0;
    });
    return r;
  }, [data.sessions, filters]);

  const surfaceMap = Object.fromEntries(data.SURFACES.map(s => [s.id, s]));
  const modelMap = Object.fromEntries(data.MODELS.map(m => [m.id, m]));

  return (
    <div className="tbl-wrap">
      <table className="tbl">
        <thead>
          <tr>
            <th>Chat</th>
            <th>Surface</th>
            <th>Model</th>
            <th className="num">Input</th>
            <th className="num">Output</th>
            <th className="num">Total</th>
            <th className="num">Cost</th>
            <th className="num">Duration</th>
            <th>When</th>
            <th />
          </tr>
        </thead>
        <tbody>
          {rows.map(s => (
            <tr key={s.id} onClick={() => onPick(s)} className={s.spike ? 'row-spike' : ''}>
              <td>
                <div className="row-title">
                  {s.title}
                  {s.spike && <span className="tag tag-spike">spike</span>}
                  {s.heavy && !s.spike && <span className="tag tag-heavy">heavy</span>}
                </div>
                <div className="row-sub muted-sm mono">{s.id} · {s.turns} turns</div>
              </td>
              <td>
                <span className="chip"><i className="sw" style={{ background: surfaceMap[s.surface].color }} />{surfaceMap[s.surface].label}</span>
              </td>
              <td>
                <span className="chip chip-ghost"><i className="sw" style={{ background: modelMap[s.model].color }} />{modelMap[s.model].label}</span>
              </td>
              <td className="num mono">{fmtTok(s.inputTokens)}</td>
              <td className="num mono">{fmtTok(s.outputTokens)}</td>
              <td className="num mono strong">{fmtTok(s.totalTokens)}</td>
              <td className="num mono">{fmt$(s.cost)}</td>
              <td className="num mono">{fmtDuration(s.durationMin)}</td>
              <td className="muted-sm">{fmtDay(s.start)} · {fmtTime(s.start)}</td>
              <td className="caret">›</td>
            </tr>
          ))}
          {rows.length === 0 && (
            <tr><td colSpan="10" className="empty">No chats match these filters.</td></tr>
          )}
        </tbody>
      </table>
    </div>
  );
}

// ---------- Session inspector drawer ----------
function Inspector({ session, onClose, data }) {
  if (!session) return null;
  const surfaceMap = Object.fromEntries(data.SURFACES.map(s => [s.id, s]));
  const modelMap = Object.fromEntries(data.MODELS.map(m => [m.id, m]));
  const PRICE = data.PRICE;
  const inCost = (session.inputTokens / 1e6) * PRICE[session.model].in;
  const outCost = (session.outputTokens / 1e6) * PRICE[session.model].out;

  const turns = Math.min(session.turns, 18);
  const turnRows = Array.from({ length: turns }).map((_, i) => {
    const iT = Math.round(session.inputTokens / turns * (0.6 + Math.random() * 0.8));
    const oT = Math.round(session.outputTokens / turns * (0.5 + Math.random() * 1.0));
    return { i: i + 1, inT: iT, outT: oT, total: iT + oT };
  });
  const maxTurn = Math.max(...turnRows.map(t => t.total));

  return (
    <>
      <div className="drawer-backdrop" onClick={onClose} />
      <aside className="drawer">
        <div className="drawer-head">
          <div>
            <div className="muted-sm mono">{session.id}</div>
            <h2 className="drawer-title">{session.title}</h2>
            <div className="drawer-meta">
              <span className="chip"><i className="sw" style={{ background: surfaceMap[session.surface].color }} />{surfaceMap[session.surface].label}</span>
              <span className="chip chip-ghost"><i className="sw" style={{ background: modelMap[session.model].color }} />{modelMap[session.model].label}</span>
              {session.spike && <span className="tag tag-spike">spike detected</span>}
              {session.heavy && !session.spike && <span className="tag tag-heavy">heavy chat</span>}
            </div>
          </div>
          <button className="x" onClick={onClose}>×</button>
        </div>

        <div className="drawer-stats">
          <Stat label="Total tokens" value={<span className="mono">{fmtTokFull(session.totalTokens)}</span>} sub={fmt$(session.cost)} />
          <Stat label="Input" value={<span className="mono">{fmtTokFull(session.inputTokens)}</span>} sub={fmt$(inCost)} />
          <Stat label="Output" value={<span className="mono">{fmtTokFull(session.outputTokens)}</span>} sub={fmt$(outCost)} />
          <Stat label="Turns" value={<span className="mono">{session.turns}</span>} sub={fmtDuration(session.durationMin)} />
        </div>

        <div className="drawer-sec">
          <div className="drawer-sec-head">
            <h3>Per-turn breakdown</h3>
            <span className="muted-sm">first {turns} turns</span>
          </div>
          <div className="turns">
            {turnRows.map(t => (
              <div key={t.i} className="turn-row">
                <span className="turn-i mono muted-sm">#{t.i}</span>
                <div className="turn-bar">
                  <div className="turn-in" style={{ width: (t.inT / maxTurn * 100) + '%' }} />
                  <div className="turn-out" style={{ width: (t.outT / maxTurn * 100) + '%' }} />
                </div>
                <span className="turn-val mono">{fmtTok(t.total)}</span>
              </div>
            ))}
          </div>
        </div>

        <div className="drawer-sec">
          <div className="drawer-sec-head"><h3>Timing</h3></div>
          <div className="timing">
            <div><span className="muted-sm">Started</span><div className="mono">{fmtDay(session.start)} · {fmtTime(session.start)}</div></div>
            <div><span className="muted-sm">Ended</span><div className="mono">{fmtDay(session.end)} · {fmtTime(session.end)}</div></div>
            <div><span className="muted-sm">Duration</span><div className="mono">{fmtDuration(session.durationMin)}</div></div>
          </div>
        </div>
      </aside>
    </>
  );
}

function Alerts({ data, cost, budget }) {
  const items = [];
  const spike = data.sessions.find(s => s.spike);
  if (spike) items.push({
    tone: 'spike',
    icon: '⚡',
    title: 'Usage spike detected',
    body: `"${spike.title}" burned ${fmtTok(spike.totalTokens)} tokens — 3× your typical chat.`,
  });
  const heavy = data.sessions.filter(s => s.heavy && !s.spike).slice(0, 1)[0];
  if (heavy) items.push({
    tone: 'heavy',
    icon: '≡',
    title: 'Heavy chat',
    body: `"${heavy.title}" is ${fmtTok(heavy.totalTokens)} tokens over ${heavy.turns} turns. Consider splitting.`,
  });
  if (cost / budget > 0.8) items.push({
    tone: 'budget',
    icon: '◐',
    title: cost > budget ? 'Over budget' : 'Approaching budget',
    body: `${fmt$(cost)} of ${fmt$(budget)} used (${((cost/budget)*100).toFixed(0)}%).`,
  });
  if (items.length === 0) return null;

  return (
    <div className="alerts">
      {items.map((a, i) => (
        <div key={i} className={`alert alert-${a.tone}`}>
          <div className="alert-icon">{a.icon}</div>

            <div className="alert-title">{a.title}</div>
            <div className="alert-text">{a.body}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

// ---------- App ----------
const TWEAK_DEFAULTS = {
  displayMode: 'both',
  density: 'comfortable',
  accent: 'indigo',
  budget: 20,
  budgetPeriod: 'month',
};

// ── Range helpers (client-side filtering) ────────────────────────────────────

function getRangeBounds(rangeKey) {
  const now = new Date();
  const Y = now.getUTCFullYear(), Mo = now.getUTCMonth(), D = now.getUTCDate();
  const utc = (y, m, d) => new Date(Date.UTC(y, m, d)).getTime();
  let start, end;
  if (rangeKey === 'week') {
    const dow = now.getUTCDay();
    const off = dow === 0 ? -6 : 1 - dow;  // Monday offset
    start = utc(Y, Mo, D + off);
    end   = start + 7 * 86400000;
  } else if (rangeKey === 'month') {
    start = utc(Y, Mo, 1);
    end   = utc(Y, Mo + 1, 1);
  } else if (rangeKey === 'last30') {
    end   = utc(Y, Mo, D + 1);
    start = end - 30 * 86400000;
  } else if (rangeKey === 'quarter') {
    const qm = Math.floor(Mo / 3) * 3;
    start = utc(Y, qm, 1);
    end   = utc(Y, qm + 3, 1);
  } else if (rangeKey === 'year') {
    start = utc(Y, 0, 1);
    end   = utc(Y + 1, 0, 1);
  } else { // alltime
    start = 0; end = Infinity;
  }
  return { start, end };
}

function getPrevRangeBounds(rangeKey) {
  const { start, end } = getRangeBounds(rangeKey);
  if (rangeKey === 'alltime') return { start: 0, end: 0 };
  const span = end - start;
  return { start: start - span, end: start };
}

function buildDailyJS(sessions, rangeKey) {
  const now = new Date();
  const Y = now.getUTCFullYear(), Mo = now.getUTCMonth(), D = now.getUTCDate();
  const utc  = (y, m, d) => new Date(Date.UTC(y, m, d));
  const todayEnd = utc(Y, Mo, D + 1).getTime();
  const DAY_NAMES = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  const makeBucket = (dateMs, endMs, label, dateLabel, future) => {
    // Build set of local date strings (YYYY-MM-DD) that fall within this bucket
    const localDates = new Set();
    for (let t = dateMs; t < endMs; t += 86400000)
      localDates.add(new Date(t).toLocaleDateString('en-CA'));

    let inTok = 0, outTok = 0, cost = 0, sessCount = 0;
    sessions.forEach(s => {
      const daily = s.dailyTokens;
      if (daily) {
        let hit = false;
        Object.entries(daily).forEach(([dateStr, d]) => {
          if (localDates.has(dateStr)) {
            inTok += d.inputTokens; outTok += d.outputTokens; cost += d.cost; hit = true;
          }
        });
        if (hit) sessCount++;
      } else {
        // Fallback for sessions without dailyTokens
        const t = new Date(s.start).getTime();
        if (t >= dateMs && t < endMs) {
          inTok += s.inputTokens; outTok += s.outputTokens; cost += s.cost; sessCount++;
        }
      }
    });
    return {
      date: new Date(dateMs).toISOString(), label, dateLabel: dateLabel || label,
      inputTokens: inTok, outputTokens: outTok, totalTokens: inTok + outTok,
      cost, sessions: sessCount,
      ...(future ? { future: true } : {}),
    };
  };

  const fmtDay = ms => new Date(ms).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  const fmtMon = ms => new Date(ms).toLocaleDateString('en-US', { month: 'short' });
  const fmtMonY = ms => new Date(ms).toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
  const DAY = 86400000;
  const result = [];

  if (rangeKey === 'week') {
    const dow = now.getUTCDay(), off = dow === 0 ? -6 : 1 - dow;
    const mon = utc(Y, Mo, D + off).getTime();
    for (let i = 0; i < 7; i++) {
      const ds = mon + i * DAY;
      result.push(makeBucket(ds, ds + DAY, DAY_NAMES[i], fmtDay(ds), ds >= todayEnd));
    }
  } else if (rangeKey === 'month') {
    const cap = Math.min(utc(Y, Mo + 1, 1).getTime(), todayEnd);
    for (let d = utc(Y, Mo, 1).getTime(); d < cap; d += DAY)
      result.push(makeBucket(d, Math.min(d + DAY, cap), fmtDay(d), fmtDay(d)));
  } else if (rangeKey === 'last30') {
    const cap = todayEnd, start30 = cap - 30 * DAY;
    for (let d = start30; d < cap; d += DAY)
      result.push(makeBucket(d, Math.min(d + DAY, cap), fmtDay(d), fmtDay(d)));
  } else if (rangeKey === 'quarter') {
    const qm = Math.floor(Mo / 3) * 3;
    const cap = Math.min(utc(Y, qm + 3, 1).getTime(), todayEnd);
    let d = utc(Y, qm, 1).getTime(), wn = 1;
    while (d < cap) {
      const de = Math.min(d + 7 * DAY, cap);
      result.push(makeBucket(d, de, `W${wn}`, fmtDay(d))); d = de; wn++;
    }
  } else if (rangeKey === 'year') {
    for (let m = 0; m <= Mo; m++) {
      const ds = utc(Y, m, 1).getTime(), de = utc(Y, m + 1, 1).getTime();
      result.push(makeBucket(ds, de, fmtMon(ds), fmtMonY(ds)));
    }
  } else { // alltime
    if (!sessions.length) return [];
    const firstT = Math.min(...sessions.map(s => new Date(s.start).getTime()));
    const fd = new Date(firstT);
    let d = utc(fd.getUTCFullYear(), fd.getUTCMonth(), 1).getTime();
    const cap = utc(Y, Mo + 1, 1).getTime();
    while (d < cap) {
      const de = utc(new Date(d).getUTCFullYear(), new Date(d).getUTCMonth() + 1, 1).getTime();
      result.push(makeBucket(d, de, fmtMon(d), fmtMonY(d))); d = de;
    }
  }
  return result;
}

function App() {
  const data = window.USAGE;
  const [tweaks, setTweaksState] = useState(() => {
    try {
      const saved = localStorage.getItem('usage_budget');
      return { ...TWEAK_DEFAULTS, ...(saved != null ? { budget: Number(saved) } : {}) };
    } catch (e) { return TWEAK_DEFAULTS; }
  });
  const [showTweaks, setShowTweaks] = useState(false);

  const setTweaks = (patch) => {
    if ('budget' in patch) {
      try { localStorage.setItem('usage_budget', patch.budget); } catch (e) {}
    }
    setTweaksState(prev => ({ ...prev, ...patch }));
  };

  const [theme, setTheme] = useState(() => {
    try { return localStorage.getItem('usage_theme') || 'light'; } catch (e) { return 'light'; }
  });

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    try { localStorage.setItem('usage_theme', theme); } catch (e) {}
  }, [theme]);

  useEffect(() => {
    document.documentElement.setAttribute('data-accent', tweaks.accent);
    document.documentElement.setAttribute('data-density', tweaks.density);
  }, [tweaks.accent, tweaks.density]);

  const toggleTheme = () => setTheme(t => t === 'dark' ? 'light' : 'dark');

  const [dateRange, setDateRange] = useState(data.rangeKey || 'week');
  const [modelFilter, setModelFilter] = useState('all');
  const [filters, setFilters] = useState({
    surface: 'all', model: 'all', q: '', sort: 'recent', onlyHeavy: false,
  });
  const [picked, setPicked] = useState(null);

  const filteredData = useMemo(() => {
    // Use allSessions (full archive) so switching dateRange in UI actually works
    const allSessions = data.allSessions || data.sessions;

    // Filter by selected date range
    const { start: rangeStart, end: rangeEnd } = getRangeBounds(dateRange);
    const rangeSessions = allSessions.filter(s => {
      const t = new Date(s.start).getTime();
      return t >= rangeStart && t < rangeEnd;
    });

    // Filter by model tab
    const sessions = modelFilter === 'all'
      ? rangeSessions
      : rangeSessions.filter(s => s.model === modelFilter);

    // Build daily buckets from sessions using JS range logic
    const daily = buildDailyJS(sessions, dateRange);

    // Build heatmap with mean+2σ ceiling so one spike doesn't wash out everything
    const grid = Array.from({ length: 7 }, () => Array(24).fill(0));
    sessions.forEach(s => {
      const h  = new Date(s.start).getHours();
      const di = s.dayIndex;  // Python stores local-time Mon=0 weekday
      if (di >= 0 && di < 7 && h >= 0 && h < 24) grid[di][h] += s.totalTokens;
    });
    const flatVals = grid.flat();
    const hmMean = flatVals.reduce((a, b) => a + b, 0) / flatVals.length;
    const hmVar  = flatVals.reduce((a, b) => a + (b - hmMean) ** 2, 0) / flatVals.length;
    const hmCeil = Math.max(hmMean + 2 * Math.sqrt(hmVar), 1);
    const heatmap = grid.map(row => row.map(v => Math.min(v / hmCeil, 1.0)));

    // Compute prev-period totals for Hero delta
    const { start: prevStart, end: prevEnd } = getPrevRangeBounds(dateRange);
    const prevSessions = allSessions.filter(s => {
      const t = new Date(s.start).getTime();
      return t >= prevStart && t < prevEnd;
    });
    const prevWeekTotal = prevSessions.reduce((a, b) => a + b.totalTokens, 0);
    const prevWeekCost  = prevSessions.reduce((a, b) => a + b.cost, 0);

    return { ...data, sessions, daily, heatmap, prevWeekTotal, prevWeekCost };
  }, [data, modelFilter, dateRange]);

  const totalCost = filteredData.daily.reduce((a, b) => a + b.cost, 0);

  return (
    <div className="app">
      <div className="topbar">
        <div className="topbar-l">
          <div className="brand">
            <div className="brand-mark">ai</div>
            <span>Usage</span>
          </div>
          <span className="crumb">
            <span className="crumb-sep">/</span>
            Tokens
          </span>
        </div>
        <div className="topbar-r">
          <DateRange value={dateRange} onChange={setDateRange} />
          <button
            className="theme-btn"
            onClick={() => window.location.reload()}
            title={`Run first: python3 generate_usage_data.py --range ${dateRange}`}
          >
            ↻ Refresh
          </button>
          <button className="theme-btn" onClick={toggleTheme} title={theme === 'dark' ? 'Switch to light' : 'Switch to dark'} aria-label="Toggle theme">
            {theme === 'dark' ? (
              <svg className="theme-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="4" />
                <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" />
              </svg>
            ) : (
              <svg className="theme-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" />
              </svg>
            )}
            <span>{theme === 'dark' ? 'Light' : 'Dark'}</span>
          </button>
          <button className={`tweak-toggle ${showTweaks ? 'on' : ''}`} onClick={() => setShowTweaks(v => !v)}>
            ⚙ Tweaks
          </button>
        </div>
      </div>

      <div style={{ position: 'sticky', top: 0, zIndex: 100, overflow: 'visible', background: 'var(--bg)', padding: '10px 0 8px', borderBottom: '1px solid var(--line)', marginBottom: 16 }}>
        <ModelTabs data={data} modelFilter={modelFilter} setModelFilter={setModelFilter} />
        <FilterBar
          data={filteredData}
          filters={filters}
          setFilters={setFilters}
          displayMode={tweaks.displayMode}
          setDisplayMode={(m) => setTweaks({ displayMode: m })}
        />
      </div>

      <Hero data={filteredData} displayMode={tweaks.displayMode} budget={tweaks.budget} dateRange={dateRange} />

      <Alerts data={filteredData} cost={totalCost} budget={tweaks.budget} />

      <div className="grid-2">
        <SurfaceSplit data={filteredData} displayMode={tweaks.displayMode} />
        <ModelMix data={filteredData} displayMode={tweaks.displayMode} />
      </div>

      <div style={{ marginBottom: 16 }}>
        <Heatmap data={filteredData} />
      </div>

      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', margin: '8px 2px 10px' }}>
        <h2 style={{ margin: 0, fontSize: 15, fontWeight: 600 }}>
          Chats <span className="muted" style={{ fontWeight: 400, fontSize: 13 }}>· {filteredData.sessions.length} this week</span>
        </h2>
      </div>

      <SessionsTable
        data={filteredData}
        filters={filters}
        onPick={setPicked}
        displayMode={tweaks.displayMode}
      />

      {picked && <Inspector session={picked} onClose={() => setPicked(null)} data={data} />}

      {showTweaks && (
        <TweaksPanel
          state={tweaks}
          setState={setTweaks}
          onClose={() => setShowTweaks(false)}
        />
      )}
    </div>
  );
}

if (window.USAGE_ERROR || !window.USAGE) {
  document.getElementById('root').innerHTML =
    '<div style="padding:48px 40px;font-family:-apple-system,sans-serif;max-width:520px">' +
    '<div style="font-size:28px;margin-bottom:12px">⚠️</div>' +
    '<div style="font-size:18px;font-weight:600;color:#0f172a;margin-bottom:8px">Could not load live_usage.js</div>' +
    '<div style="color:#64748b;margin-bottom:20px">Run the generator script first, then reload this page.</div>' +
    '<code style="display:block;background:#f1f5f9;padding:10px 14px;border-radius:8px;font-size:13px;color:#1e293b">' +
    'python3 generate_usage_data.py</code>' +
    (window.USAGE_ERROR ? '<div style="margin-top:16px;font-size:12px;color:#94a3b8">Error: ' + window.USAGE_ERROR + '</div>' : '') +
    '</div>';
} else {
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
}
</script>
</body>
</html>
